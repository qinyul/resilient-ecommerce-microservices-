version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ecommerce_rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    networks:
      - ecommerce_net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  order-db:
    image: postgres:16-alpine
    container_name: ecommerce_order_db
    ports:
      - "${ORDER_DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${ORDER_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${ORDER_DB_PASSWORD:-postgres}
      POSTGRES_DB: ${ORDER_DB_NAME:-orders}
    volumes:
      - order_db_data:/var/lib/postgresql/data
      - ./deploy/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ecommerce_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ORDER_DB_USER:-postgres} -d ${ORDER_DB_NAME:-orders}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  order-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner # Assuming a multi-stage Dockerfile with an 'order' target
    container_name: order_service
    command: ["/app/order"]
    ports:
      - "${ORDER_PORT:-50051}:50051"
    environment:
      APP_ENV: ${APP_ENV:-development}
      ORDER_PORT: 50051
      ORDER_DB_HOST: order-db
      ORDER_DB_PORT: 5432
      ORDER_DB_USER: ${ORDER_DB_USER:-postgres}
      ORDER_DB_PASSWORD: ${ORDER_DB_PASSWORD:-postgres}
      ORDER_DB_NAME: ${ORDER_DB_NAME:-orders}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    depends_on:
      order-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecommerce_net

  payment-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: payment_service
    command: ["/app/payment"]
    environment:
      APP_ENV: ${APP_ENV:-development}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
      RABBITMQ_ROUTING_KEY: order_created
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - ecommerce_net

  product-db:
    image: postgres:16-alpine
    container_name: ecommerce_product_db
    ports:
      - "${PRODUCT_DB_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${PRODUCT_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${PRODUCT_DB_PASSWORD:-postgres}
      POSTGRES_DB: ${PRODUCT_DB_NAME:-products}
    volumes:
      - product_db_data:/var/lib/postgresql/data
      - ./deploy/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ecommerce_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PRODUCT_DB_USER:-postgres} -d ${PRODUCT_DB_NAME:-products}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  product-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: product_service
    command: ["/app/product"]
    ports:
      - "${PRODUCT_PORT:-50052}:50052"
    environment:
      APP_ENV: ${APP_ENV:-development}
      PRODUCT_PORT: 50052
      PRODUCT_DB_HOST: product-db
      PRODUCT_DB_PORT: 5432
      PRODUCT_DB_USER: ${PRODUCT_DB_USER:-postgres}
      PRODUCT_DB_PASSWORD: ${PRODUCT_DB_PASSWORD:-postgres}
      PRODUCT_DB_NAME: ${PRODUCT_DB_NAME:-products}
    depends_on:
      product-db:
        condition: service_healthy
    networks:
      - ecommerce_net

  gateway-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: gateway_service
    command: ["/app/gateway"]
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      APP_ENV: ${APP_ENV:-development}
      GATEWAY_PORT: 8080
      ORDER_SERVICE_ADDR: order-service:50051
      PRODUCT_SERVICE_ADDR: product-service:50052
    depends_on:
      - order-service
      - product-service
    networks:
      - ecommerce_net

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: ecommerce_jaeger
    ports:
      - "16686:16686" # Web UI
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - ecommerce_net

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: ecommerce_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - ecommerce_net

  grafana:
    image: grafana/grafana:10.0.3
    container_name: ecommerce_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    networks:
      - ecommerce_net

  loki:
    image: grafana/loki:2.9.2
    container_name: ecommerce_loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - ecommerce_net

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.91.0
    container_name: ecommerce_otel_collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./deploy/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP HTTP receiver
      - "8889:8889" # Prometheus metrics exporter
    depends_on:
      - jaeger
      - loki
    networks:
      - ecommerce_net

networks:
  ecommerce_net:
    driver: bridge

volumes:
  order_db_data:
  product_db_data:
